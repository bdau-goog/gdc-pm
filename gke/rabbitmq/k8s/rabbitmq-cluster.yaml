---
# ============================================================================
# RabbitMQ — Cluster (via RabbitMQ Cluster Operator)
# ============================================================================
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: gdc-pm-rabbitmq
  namespace: gdc-pm
spec:
  replicas: 1
  image: rabbitmq:3.12-management
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  persistence:
    # storageClassName omitted — uses the cluster's default StorageClass.
    # On GKE this resolves to "standard" (GCE PD).
    # On GDC Software-Only, ensure a default StorageClass is provisioned,
    # or uncomment and set the appropriate class:
    # storageClassName: local-storage
    storage: 5Gi
  rabbitmq:
    additionalConfig: |
      default_user = gdc_user
      default_pass = RABBITMQ_PASSWORD_PLACEHOLDER
      default_vhost = gdc-pm
      log.console.level = info
  service:
    type: ClusterIP
