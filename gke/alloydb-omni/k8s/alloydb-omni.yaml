---
# ============================================================================
# AlloyDB Omni — PersistentVolumeClaim
# ============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alloydb-omni-pvc
  namespace: gdc-pm
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# ============================================================================
# AlloyDB Omni — Deployment
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloydb-omni
  namespace: gdc-pm
  labels:
    app: alloydb-omni
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alloydb-omni
  template:
    metadata:
      labels:
        app: alloydb-omni
    spec:
      containers:
        - name: alloydb-omni
          image: google/alloydbomni:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: alloydb-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alloydb-secret
                  key: password
            - name: POSTGRES_DB
              value: "grid_reliability"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: alloydb-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: alloydb-data
          persistentVolumeClaim:
            claimName: alloydb-omni-pvc

---
# ============================================================================
# AlloyDB Omni — ClusterIP Service (internal only)
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: alloydb-omni
  namespace: gdc-pm
  labels:
    app: alloydb-omni
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: alloydb-omni
