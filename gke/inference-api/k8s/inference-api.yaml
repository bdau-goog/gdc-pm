---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: gdc-pm
  labels:
    app: inference-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      serviceAccountName: ml-inference-ksa
      containers:
        - name: inference-api
          image: GCR_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: GCS_MODEL_PATH
              value: "GCS_MODEL_PATH_PLACEHOLDER"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: gdc-pm
  labels:
    app: inference-api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: inference-api

---
# Kubernetes Service Account bound to the ml-pipeline-sa GCP Service Account
# for Workload Identity (access to GCS without JSON keys in GKE)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-inference-ksa
  namespace: gdc-pm
  annotations:
    iam.gke.io/gcp-service-account: ml-pipeline-sa@PROJECT_ID_PLACEHOLDER.iam.gserviceaccount.com
