---
# ============================================================================
# Inference API — Multi-Asset-Type Failure Classifier
#
# Two deployment modes — choose one:
#
# MODE 1: GKE (cloud simulation)
#   - Set GCS_MODEL_BUCKET and enable Workload Identity on the ServiceAccount
#   - Models are downloaded from GCS at pod startup
#
# MODE 2: GDC Software-Only (air-gapped / disconnected)
#   - Set LOCAL_MODELS_DIR to "/app/models" (models baked into the image)
#   - Clear GCS_MODEL_BUCKET and GCS_MODEL_PATH
#   - Build the container with models already copied into /app/models/
#   - No GCP credentials or internet access required
# ============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: gdc-pm
  labels:
    app: inference-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
    spec:
      serviceAccountName: ml-inference-ksa
      containers:
        - name: inference-api
          image: GCR_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            # ── GKE / Cloud Mode ────────────────────────────────────────────
            # Set GCS_MODEL_BUCKET to download models from GCS at startup.
            # Requires Workload Identity annotation on the ServiceAccount.
            - name: GCS_MODEL_BUCKET
              value: "gdc-pm-v2-models"

            # Legacy single-model path (kept for backward compatibility).
            - name: GCS_MODEL_PATH
              value: ""

            # ── GDC Software-Only / Air-Gapped Mode ─────────────────────────
            # Set LOCAL_MODELS_DIR to load models from the container image
            # instead of GCS. Build the container with models at this path.
            # When set, GCS_MODEL_BUCKET/GCS_MODEL_PATH are not used.
            # Example: /app/models (models baked in at image build time)
            - name: LOCAL_MODELS_DIR
              value: ""
          resources:
            requests:
              cpu: "250m"
              memory: "768Mi"    # increased for 3 models in memory
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: gdc-pm
  labels:
    app: inference-api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: inference-api

---
# Kubernetes Service Account for the inference-api pod.
#
# GKE (cloud simulation): annotate with iam.gke.io/gcp-service-account to
# enable Workload Identity so the pod can pull models from GCS without
# embedding credentials:
#   iam.gke.io/gcp-service-account: ml-pipeline-sa@PROJECT_ID.iam.gserviceaccount.com
#
# GDC Software-Only (air-gapped / disconnected): no annotation needed.
# Set LOCAL_MODELS_DIR in the Deployment env vars instead so the inference-api
# loads models from a path baked into the container image.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ml-inference-ksa
  namespace: gdc-pm
  annotations:
    iam.gke.io/gcp-service-account: ml-pipeline-sa@gdc-pm-v2.iam.gserviceaccount.com
